# Megalo — Netlify deployment config
# Docs: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # Build from repo root so pnpm installs all workspace packages correctly
  base    = "."
  command = "pnpm install --frozen-lockfile && pnpm --filter frontend-client run build"
  publish = "apps/frontend-client/.next"

  [build.environment]
    NODE_VERSION = "20"
    PNPM_VERSION = "9.0.0"

# Netlify's Next.js runtime handles API routes, Server Components, and ISR.
# It is installed automatically when Netlify detects a Next.js project.
[[plugins]]
  package = "@netlify/plugin-nextjs"

# ─── Environment variables ────────────────────────────────────────────────────
# Set these in the Netlify UI under Site → Environment variables.
# Never commit real keys here.
#
# Required:
#   MIDNIGHT_NETWORK_ID           = preprod          (testnet) or undeployed (local)
#   MIDNIGHT_INDEXER_URL          = https://indexer.testnet.midnight.network/api/v1/graphql
#   MIDNIGHT_RPC_URL              = wss://rpc.testnet.midnight.network
#   MIDNIGHT_PROOF_SERVER_URL     = https://proof.testnet.midnight.network
#   LENDING_POOL_ADDRESS          = <deployed address>
#   GOVERNANCE_ADDRESS            = <deployed address>
#   CREDIT_PROOF_ADDRESS          = <deployed address>
#   ASSET_PROOF_ADDRESS           = <deployed address>
#   CLAUDE_API_KEY                = sk-ant-...
#
# Optional (open banking):
#   PLAID_CLIENT_ID, PLAID_SECRET, PLAID_ENV
